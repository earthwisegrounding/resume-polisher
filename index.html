<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Left Behind</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #ff4757;
            font-size: 2rem;
        }
        p {
            color: #57606f;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>I bet you guys went to the point without me.</h1>
        <p>Ya jerks!</p>
    </div>
</body>
</html>

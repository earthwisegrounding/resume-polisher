<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Comparison: Original vs. Enhanced</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            margin-bottom: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .audio-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            transition: transform 0.2s;
        }

        .audio-card:hover {
            transform: translateY(-4px);
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 0.5rem;
        }

        audio {
            width: 100%;
            border-radius: 8px;
        }

        .label-before { color: #64748b; }
        .label-after { color: #059669; }

        @media (max-width: 640px) {
            .comparison-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Audio Processing Showcase</h1>
        
        <div class="comparison-grid">
            <div class="audio-card">
                <h2 class="label-before">Before (Original)</h2>
                <p>Initial voice recording without background processing.</p>
                <audio controls>
                    <source src="https://github.com/earthwisegrounding/resume-polisher/releases/download/Audio/Marv.s.audio.clone.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>

            <div class="audio-card">
                <h2 class="label-after">After (Enhanced)</h2>
                <p>Processed version with background music and leveling.</p>
                <audio controls>
                    <source src="https://github.com/earthwisegrounding/resume-polisher/releases/download/Audio/Marv.s.audio.clone-esv2-49p-bg-m-music-27p.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </div>
    </div>

</body>
</html>
